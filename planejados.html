<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Planejados</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 60px 40px;
  background: #f5f5f5;
  text-align: center;
}

h1 {
  margin-bottom: 50px;
  font-size: 32px;
}

/* GRID MAIOR E PREMIUM */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 30px;
}

/* CARD */
.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  border-radius: 10px;
}

/* HOVER PROFISSIONAL */
.card:hover {
  transform: scale(1.03);
}
</style>

</head>

<body>

<h1>Móveis Planejados</h1>

<div class="grid">

  <div class="card"><img src="imagens/plan1.png"></div>
  <div class="card"><img src="imagens/plan2.png"></div>
  <div class="card"><img src="imagens/plan3.png"></div>
  <div class="card"><img src="imagens/plan4.png"></div>
  <div class="card"><img src="imagens/plan5.png"></div>
  <div class="card"><img src="imagens/plan6.png"></div>
  <div class="card"><img src="imagens/plan7.png"></div>
  <div class="card"><img src="imagens/plan8.png"></div>
  <div class="card"><img src="imagens/plan9.png"></div>
  <div class="card"><img src="imagens/plan10.png"></div>

</div>

</body>
</html>
