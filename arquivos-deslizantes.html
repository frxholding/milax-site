<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Arquivos Deslizantes</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 40px;
  background: #f5f5f5;
  text-align: center;
}

h1 {
  margin-bottom: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  transition: 0.3s;
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: contain;
  border-radius: 8px;
}

.card:hover {
  transform: translateY(-5px);
}
</style>

</head>

<body>

<h1>Arquivos Deslizantes</h1>

<div class="grid">

  <div class="card"><img src="imagens/arq1.png"></div>
  <div class="card"><img src="imagens/arq2.png"></div>
  <div class="card"><img src="imagens/arq3.png"></div>
  <div class="card"><img src="imagens/arq4.png"></div>
  <div class="card"><img src="imagens/arq5.png"></div>
  <div class="card"><img src="imagens/arq6.png"></div>
  <div class="card"><img src="imagens/arq7.png"></div>
  <div class="card"><img src="imagens/arq8.png"></div>
  <div class="card"><img src="imagens/arq9.png"></div>
  <div class="card"><img src="imagens/arq10.png"></div>
  <div class="card"><img src="imagens/arq11.png"></div>
  <div class="card"><img src="imagens/arq12.png"></div>

</div>

</body>
</html>
